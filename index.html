<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
    <title>список задача</title>
</head>

<body>
    <div class="container">
        <h1>Список задач</h1>
        <input type="checkbox" id="themeSwitch" aria-label="Переключить на дневную / ночную тему" />

        <label for="themeSwitch">
            <div class="switch-block">
                <div class="indicator">
                    <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 13 13" fill="none">
                        <path
                            d="M10.6067 2.12132C9.83451 1.34916 8.89689 0.8358 7.9126 0.572756C8.44717 2.57528 7.93381 4.79418 6.36403 6.36396C4.79425 7.93374 2.57535 8.4471 0.572826 7.91253C0.83587 8.89682 1.34923 9.83444 2.12139 10.6066C4.46333 12.9485 8.26473 12.9485 10.6067 10.6066C12.9486 8.26466 12.9486 4.46326 10.6067 2.12132Z"
                            fill="currentColor" />
                    </svg>
                </div>
            </div>
        </label>
        <div class="header">
            <input id="inputTask" type="text">
            <button type="submit" id="addTaskBtn">Добавить</button>
        </div>

        <div id="list"></div>
    </div>


    <script src="js/skript.js"></script>
</body>

</html>
